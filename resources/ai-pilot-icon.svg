<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- AI-Pilot app icon — macOS glass squircle: transparent margins, gradient tile,
       glossy top sweep, soft inner rim. Robot artwork recreated from user's reference. -->
  <defs>
    <linearGradient id="apTile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfbfd"/>
      <stop offset="0.55" stop-color="#eceef3"/>
      <stop offset="1" stop-color="#d8dbe4"/>
    </linearGradient>
    <linearGradient id="apGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="apShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#1a1c26" flood-opacity="0.35"/>
    </filter>
    <clipPath id="apClip"><rect x="100" y="100" width="824" height="824" rx="185"/></clipPath>
  </defs>

  <!-- tile -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#apTile)" filter="url(#apShadow)"/>

  <g clip-path="url(#apClip)">
    <!-- robot -->
    <g transform="translate(512,516) scale(1.02) translate(-460,-468)">
      <g>
        <circle cx="700" cy="268" r="96" fill="#d5475a"/>
        <path d="M632 332 L596 384 L668 356 Z" fill="#d5475a"/>
        <circle cx="656" cy="268" r="13" fill="#ece9f7"/>
        <circle cx="700" cy="268" r="13" fill="#ece9f7"/>
        <circle cx="744" cy="268" r="13" fill="#ece9f7"/>
      </g>
      <rect x="438" y="180" width="20" height="70" rx="10" fill="#5f6379"/>
      <ellipse cx="448" cy="172" rx="22" ry="26" fill="#5f6379"/>
      <circle cx="306" cy="330" r="34" fill="#5f6379"/>
      <circle cx="590" cy="330" r="34" fill="#5f6379"/>
      <rect x="318" y="248" width="260" height="164" rx="36" fill="#ece9f7"/>
      <rect x="346" y="278" width="204" height="104" rx="20" fill="#8fc9f0"/>
      <circle cx="408" cy="330" r="24" fill="#2f3040"/>
      <circle cx="488" cy="330" r="24" fill="#2f3040"/>
      <circle cx="416" cy="322" r="8" fill="#ffffff"/>
      <circle cx="496" cy="322" r="8" fill="#ffffff"/>
      <rect x="408" y="412" width="80" height="42" rx="12" fill="#2f3040"/>
      <path d="M330 500 C 250 520 240 600 260 660 C 268 682 300 682 306 658 C 296 610 306 560 350 546 Z" fill="#5f6379"/>
      <path d="M566 500 C 646 520 656 600 636 660 C 628 682 596 682 590 658 C 600 610 590 560 546 546 Z" fill="#5f6379"/>
      <circle cx="283" cy="676" r="30" fill="#4d9df5"/>
      <circle cx="613" cy="676" r="30" fill="#4d9df5"/>
      <rect x="330" y="452" width="236" height="216" rx="40" fill="#ece9f7"/>
      <rect x="368" y="496" width="160" height="18" rx="9" fill="#cfcbe6"/>
      <rect x="368" y="536" width="160" height="18" rx="9" fill="#cfcbe6"/>
      <rect x="368" y="576" width="160" height="18" rx="9" fill="#cfcbe6"/>
      <path d="M366 668 A 82 78 0 0 0 530 668 Z" fill="#9fcdf3"/>
      <ellipse cx="448" cy="756" rx="26" ry="30" fill="#5f6379"/>
    </g>

    <!-- glass: top gloss sweep -->
    <path d="M100 100 h824 v300 q-412 120 -824 0 Z" fill="url(#apGloss)" opacity="0.32"/>
  </g>

  <!-- inner rim highlight -->
  <rect x="106" y="106" width="812" height="812" rx="179" fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="4"/>
  <rect x="100.5" y="100.5" width="823" height="823" rx="184.5" fill="none" stroke="#8b8fa3" stroke-opacity="0.35" stroke-width="1"/>
</svg>
