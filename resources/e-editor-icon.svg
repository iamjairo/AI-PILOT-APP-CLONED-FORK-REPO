<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- e-Editor icon — macOS glass squircle: transparent margins, gradient tile,
       glossy top sweep, soft inner rim. Monitor + code + pencil artwork. -->
  <defs>
    <linearGradient id="eeTile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfbfd"/>
      <stop offset="0.55" stop-color="#eceef3"/>
      <stop offset="1" stop-color="#d8dbe4"/>
    </linearGradient>
    <linearGradient id="eeGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="eeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#1a1c26" flood-opacity="0.35"/>
    </filter>
    <clipPath id="eeClip"><rect x="100" y="100" width="824" height="824" rx="185"/></clipPath>
  </defs>

  <!-- tile -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#eeTile)" filter="url(#eeShadow)"/>

  <g clip-path="url(#eeClip)">
    <!-- monitor + pencil -->
    <g transform="translate(512,512) scale(0.94) translate(-512,-500)">
      <rect x="464" y="716" width="96" height="80" fill="#1c4467"/>
      <rect x="384" y="782" width="256" height="52" rx="26" fill="#2d6390"/>
      <rect x="222" y="220" width="580" height="512" rx="46" fill="#2d6390"/>
      <rect x="262" y="256" width="500" height="440" rx="26" fill="#58aede"/>
      <rect x="282" y="274" width="460" height="404" rx="16" fill="#14395f"/>
      <path d="M282 290 a16 16 0 0 1 16 -16 h428 a16 16 0 0 1 16 16 v54 h-460 Z" fill="#f2b32c"/>
      <circle cx="322" cy="301" r="11" fill="#c93646"/>
      <circle cx="360" cy="301" r="11" fill="#58aede"/>
      <circle cx="398" cy="301" r="11" fill="#1c4467"/>
      <g stroke="#ffffff" stroke-width="34" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path d="M418 436 L352 508 L418 580"/>
        <path d="M556 436 L622 508 L556 580"/>
        <path d="M512 424 L462 592"/>
      </g>
      <g transform="rotate(45 700 560)">
        <rect x="668" y="330" width="86" height="238" rx="10" fill="#58aede"/>
        <rect x="668" y="330" width="86" height="46" rx="10" fill="#7fc4ea"/>
        <rect x="668" y="300" width="86" height="48" rx="18" fill="#c93646"/>
        <path d="M668 568 h86 L724 660 a14 14 0 0 1 -26 0 Z" fill="#f0cba4"/>
        <path d="M718 634 L724 660 a14 14 0 0 1 -26 0 L704 634 Z" fill="#16395c"/>
      </g>
    </g>

    <!-- glass: top gloss sweep -->
    <path d="M100 100 h824 v300 q-412 120 -824 0 Z" fill="url(#eeGloss)" opacity="0.32"/>
  </g>

  <!-- inner rim highlight -->
  <rect x="106" y="106" width="812" height="812" rx="179" fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="4"/>
  <rect x="100.5" y="100.5" width="823" height="823" rx="184.5" fill="none" stroke="#8b8fa3" stroke-opacity="0.35" stroke-width="1"/>
</svg>
